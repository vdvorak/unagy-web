; mypy konfigurace pro pipeline engine (scripts/pipeline/core/).
; Type anotace = čitelnostní guard (constitution §Standardy kódu: explicitní typy).
; Non-strict: stav běhu / YAML jsou genuinně dynamické (dict[str, Any]), nehoníme
; každou hodnotu — jde o explicitní rozhraní (signatury, doménový model), ne o dogma.
[mypy]
python_version = 3.12
ignore_missing_imports = True

; PyYAML nemá v tomhle env stuby — bez nich by každý import yaml hlásil import-untyped.
[mypy-yaml]
ignore_missing_imports = True

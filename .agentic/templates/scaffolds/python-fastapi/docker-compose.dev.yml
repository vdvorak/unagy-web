# Lokální dev smyčka v kontejneru (host-nezávislost = determinismus prostředí).
#   docker compose -f docker-compose.dev.yml up --build
# App s hot-reloadem (zdroják mountovaný) + Postgres se zdravotní kontrolou.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    ports:
      - "5432:5432"
    volumes:
      - app_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-app}
    volumes:
      - ./server:/app/server          # hot-reload zdrojáku
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  app_pgdata:

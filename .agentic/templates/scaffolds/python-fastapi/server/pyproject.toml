[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["."]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
# E/F/I/W = pycodestyle, pyflakes, isort, warnings. Vědomě NE "SIM": ruff SIM108 tlačí
# ternár místo if, ale framework preferuje if před ternárem (constitution §Standardy).
select = ["E", "F", "I", "W"]

[tool.ruff.format]
quote-style = "double"

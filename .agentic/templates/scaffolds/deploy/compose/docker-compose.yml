# Lokální dev: app + samostatný postgres service (NE embedded — to je jen Fly prod).
# Spusť: docker compose up --build
services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-app}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-app}
      - POSTGRES_DB=${POSTGRES_DB:-app}
    volumes:
      - app_postgres_data:/var/lib/postgresql/data
      - ./contracts/db/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: deploy/compose/Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-app}
      - APP_SECRET_KEY=${APP_SECRET_KEY:-dev-insecure-change-me}
    volumes:
      - ./server:/app/server
      - ./contracts:/app/contracts
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  app_postgres_data:

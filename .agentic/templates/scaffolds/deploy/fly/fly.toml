app = '<app-name>'
primary_region = 'fra'

[build]

[[mounts]]
  source = '<app-name>_data'
  destination = '/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 2

[env]
  AUTO_MIGRATE = "true"
  APP_BASE_URL = "https://<app-name>.fly.dev"
  APP_WEB_URL = "https://<app-name>.fly.dev"
  UPLOAD_DIR = "/data/uploads"
  # Embedded local postgres — not a secret, vždy localhost uvnitř machiny
  DATABASE_URL = "postgresql+asyncpg://<app-name>:<app-name>@localhost:5432/<app-name>"

# Secrets — fly secrets set KEY=value --app <app-name>
# APP_SECRET_KEY=<fernet>  (python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")

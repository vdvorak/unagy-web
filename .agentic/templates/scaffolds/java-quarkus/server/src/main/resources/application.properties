quarkus.http.port=8080
quarkus.rest.path=/api/v1
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=classpath:db/migration

quarkus.swagger-ui.always-include=true
%prod.quarkus.swagger-ui.enable=false

# JWT (RS256) — dev klíče vygeneruj dle src/main/resources/dev/README.md
smallrye.jwt.sign.key.location=file:${JWT_KEY_DIR:/app/keys}/privateKey.pem
mp.jwt.verify.publickey.location=file:${JWT_KEY_DIR:/app/keys}/publicKey.pem
mp.jwt.verify.issuer=app
smallrye.jwt.new-token.issuer=app
smallrye.jwt.new-token.lifespan=900

quarkus.datasource.db-kind=postgresql
# Pozor: jdbc.url NENÍ v default profilu — jinak DevServices nespustí test container.
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/app
%dev.quarkus.datasource.username=app
%dev.quarkus.datasource.password=app
%dev.quarkus.http.cors.origins=http://localhost:5173
%dev.smallrye.jwt.sign.key.location=dev/privateKey.pem
%dev.mp.jwt.verify.publickey.location=dev/publicKey.pem

%test.quarkus.http.port=0
%test.smallrye.jwt.sign.key.location=dev/privateKey.pem
%test.mp.jwt.verify.publickey.location=dev/publicKey.pem
